spring:
  application:
    name: payment-service-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/test

server:
  port: 0

# Payment Gateway Configuration
payment:
  gateway:
    default: mock

    stripe:
      enabled: false
      api-key: sk_test_xxx

    paypal:
      enabled: false
      client-id: xxx
      client-secret: xxx

    mock:
      enabled: true
      delay-ms: 0
      failure-rate: 0.0

  encryption:
    enabled: false

# Rate Limiting - disabled for tests
rate-limit:
  enabled: false

# Logging
logging:
  level:
    root: WARN
    com.shoppingcart.payment: INFO
    org.springframework.security: WARN
