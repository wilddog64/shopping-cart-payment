---
# Default deny all ingress and egress for payment namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: shopping-cart-payment
  labels:
    pci-scope: "true"
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow ingress from order service (shopping-cart-apps namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-order-service
  namespace: shopping-cart-payment
  labels:
    pci-scope: "true"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: shopping-cart
          app.kubernetes.io/component: application
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: order-service
    ports:
    - protocol: TCP
      port: 8084
---
# Allow egress to PostgreSQL in data namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-postgresql
  namespace: shopping-cart-payment
  labels:
    pci-scope: "true"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/component: data
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
          app.kubernetes.io/instance: payment
    ports:
    - protocol: TCP
      port: 5432
---
# Allow egress to RabbitMQ in data namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-rabbitmq
  namespace: shopping-cart-payment
  labels:
    pci-scope: "true"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/component: data
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: rabbitmq
    ports:
    - protocol: TCP
      port: 5672
---
# Allow egress to Keycloak for JWT validation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-keycloak
  namespace: shopping-cart-payment
  labels:
    pci-scope: "true"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: identity
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8080
---
# Allow egress to external payment gateways (Stripe, PayPal)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-payment-gateways
  namespace: shopping-cart-payment
  labels:
    pci-scope: "true"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  policyTypes:
  - Egress
  egress:
  # Allow HTTPS to external APIs
  - ports:
    - protocol: TCP
      port: 443
---
# Allow DNS resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: shopping-cart-payment
  labels:
    pci-scope: "true"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
